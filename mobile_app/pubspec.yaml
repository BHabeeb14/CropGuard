name: cropguard
description: CropGuard Edge AI - Offline crop disease detection for smallholder farmers.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  
  # ML & Camera
  tflite_flutter: ^0.12.1
  camera: ^0.10.5+9
  
  # UI
  google_fonts: ^6.1.0
  image: ^4.1.3
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/models/
    - assets/labels/
    - assets/advice/
    - assets/hierarchy_manifest.json
    - assets/models/hierarchical/
    - assets/labels/hierarchical/
    - assets/labels/hierarchical/diseases/
